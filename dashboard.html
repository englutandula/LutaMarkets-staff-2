<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="LutaMarkets – Website Management & Student Payment System for Financial Market Mentorship">
  <title>LutaMarkets – Student Payment System</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- html2canvas for receipt PNG export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- QR code generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Protect this route
    protectRoute().then(session => {
      if (session) {
        updateAuthUI(session.user);
      }
    });
  </script>
</head>

<body>
  <div class="app-layout">
    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="Header logo (navbar).jpg" alt="LutaMarkets Logo" onerror="this.style.display='none'">
        <h1>LutaMarkets</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-icon">📊</span>
          Dashboard
        </button>
        <button class="nav-item" data-view="payments">
          <span class="nav-icon">💳</span>
          Payments
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item" onclick="signOut()">
          <span class="nav-icon">🚪</span>
          Logout
        </button>
      </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <div class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
          <div class="topbar-search">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" placeholder="Search students..." id="global-search">
          </div>
        </div>

        <div class="topbar-actions">
          <button class="topbar-btn" title="Notifications">
            🔔
            <span class="notification-dot"></span>
          </button>
          <button class="topbar-btn" title="Settings">⚙️</button>
          <button class="topbar-profile">
            <div class="avatar">..</div>
            <div class="profile-info">
              <div class="profile-name">Loading...</div>
              <div class="profile-role">Administrator</div>
            </div>
          </button>
        </div>
      </header>

      <!-- Dynamic Page Content -->
      <main id="app-content">
        <!-- Views are rendered here by JavaScript -->
        <div class="page-content" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
          <div style="text-align:center;color:var(--text-muted);">
            <div style="font-size:2.5rem;margin-bottom:16px;">⏳</div>
            <p>Loading dashboard...</p>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="footer-brand">
          <div class="footer-logo">LM</div>
          LutaMarkets Academy Management System
        </div>
        <div class="footer-links">
          <a href="#">Help Center</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Audit Logs</a>
        </div>
        <div>&copy; 2026 LutaMarkets Inc.</div>
      </footer>
    </div>
  </div>

  <!-- ====== SCRIPTS ====== -->
  <script src="js/countries.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/receipt.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
