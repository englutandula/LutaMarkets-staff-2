<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LutaMarkets – Sign In / Sign Up to the Student Payment System">
  <title>LutaMarkets – Sign In / Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-branding">
        <img src="Auth page logo.jpg" alt="LutaMarkets Logo" class="auth-logo">
        <h2>LutaMarkets</h2>
        <p>Student Payment System</p>
      </div>

      <!-- Sign In Form -->
      <div id="signin-section">
        <div class="auth-header">
          <h3>Welcome Back</h3>
          <p>Please enter your details to sign in.</p>
        </div>
        <form id="signin-form">
          <div class="form-group">
            <label class="form-label" for="signin-email">Email Address</label>
            <input type="email" id="signin-email" name="email" autocomplete="username" class="form-input"
              placeholder="admin@lutamarkets.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signin-password">Password</label>
            <input type="password" id="signin-password" name="password" autocomplete="current-password"
              class="form-input" placeholder="••••••••" required>
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="remember-me" checked>
            <label for="remember-me">Remember me</label>
          </div>

          <button type="submit" class="btn btn-primary w-100" id="signin-btn">Sign In</button>
        </form>
        <p class="auth-footer-text">
          Don't have an account? <a href="#" id="show-signup">Create Account</a>
        </p>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-section" style="display: none;">
        <div class="auth-header">
          <h3>Create Account</h3>
          <p>Sign up to start managing student payments.</p>
        </div>
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label" for="signup-name">Full Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="Emanuel Lutandula" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email Address</label>
            <input type="email" id="signup-email" class="form-input" placeholder="admin@lutamarkets.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-confirm-password">Confirm Password</label>
            <input type="password" id="signup-confirm-password" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="signup-btn">Sign Up</button>
        </form>
        <p class="auth-footer-text">
          Already have an account? <a href="#" id="show-signin">Sign In Instead</a>
        </p>
      </div>

      <div id="auth-error" class="alert alert-danger" style="display: none; margin-top: 15px;"></div>
      <div id="auth-success" class="alert alert-success" style="display: none; margin-top: 15px;"></div>
    </div>
  </div>

  <style>
    .auth-page {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 1);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      color: #0f172a;
    }

    .auth-branding {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 15px;
      margin: 0 auto 15px;
      object-fit: cover;
    }

    .auth-branding h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .auth-branding p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
      color: #64748b;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      cursor: pointer;
      user-select: none;
    }

    .auth-header {
      margin-bottom: 25px;
    }

    .auth-header h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .auth-header p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .w-100 {
      width: 100%;
    }

    .auth-footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
      color: #64748b;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .alert-danger {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fee2e2;
    }

    .alert-success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #dcfce7;
    }

    .loader-dots::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {

      0%,
      20% {
        content: '.';
      }

      40% {
        content: '..';
      }

      60%,
      100% {
        content: '...';
      }
    }
  </style>

  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Initial Check
      checkSessionAndRedirect();

      // 2. Toggle View
      const signInSec = document.getElementById('signin-section');
      const signUpSec = document.getElementById('signup-section');
      const errorMsg = document.getElementById('auth-error');
      const successMsg = document.getElementById('auth-success');

      document.getElementById('show-signup').addEventListener('click', (e) => {
        e.preventDefault();
        signInSec.style.display = 'none';
        signUpSec.style.display = 'block';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
      });

      document.getElementById('show-signin').addEventListener('click', (e) => {
        e.preventDefault();
        signUpSec.style.display = 'none';
        signInSec.style.display = 'block';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
      });

      // 3. Handle Sign In
      document.getElementById('signin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signin-email').value;
        const password = document.getElementById('signin-password').value;
        const btn = document.getElementById('signin-btn');

        btn.disabled = true;
        btn.innerHTML = 'Signing in... <span class="loader-dots"></span>';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        try {
          await signIn(email, password);
          // Redirect immediately
          window.location.replace('dashboard.html');
        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // 4. Handle Sign Up
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const confirmPassword = document.getElementById('signup-confirm-password').value;
        const btn = document.getElementById('signup-btn');

        if (password !== confirmPassword) {
          errorMsg.textContent = "Passwords do not match.";
          errorMsg.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Creating account... <span class="loader-dots"></span>';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        try {
          await signUp(email, password, fullName);

          // Show success and retrace to login card automatically
          successMsg.textContent = 'Account created successfully! Please sign in.';
          successMsg.style.display = 'block';

          signUpSec.style.display = 'none';
          signInSec.style.display = 'block';

          // Clear signup form
          document.getElementById('signup-form').reset();

          btn.disabled = false;
          btn.textContent = 'Sign Up';
        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign Up';
        }
      });
    });
  </script>
</body>

</html>
